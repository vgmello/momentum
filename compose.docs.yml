# Standalone Docker Compose for local docs development.
# Usage: docker compose -f compose.docs.yml up
# The image is static (tools baked in); source files are mounted at runtime.
# The docs_node_modules named volume caches bun install results across restarts.

services:
  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    ports:
      - "8119:5173"
    volumes:
      - ./:/app
      - docs_node_modules:/app/docs/node_modules
    restart: unless-stopped

volumes:
  docs_node_modules:
