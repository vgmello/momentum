# Standalone Docker Compose for local docs development.
# Usage: docker compose -f compose.docs.yml up
# The image contains baked-in tools (dotnet, bun, docfx, events-docsgen).
# Source files are mounted at runtime; bun install runs on startup using the
# docs_node_modules named volume as cache across container restarts.

services:
  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    ports:
      - "8119:5173"
    volumes:
      - ./:/app
      - docs_node_modules:/app/docs/node_modules
    restart: unless-stopped

volumes:
  docs_node_modules:
