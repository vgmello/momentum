name: Publish Momentum Template

on:
  # Run after publish-libs workflow completes successfully
  # This is the only automatic trigger - ensures template always publishes with latest lib version
  workflow_run:
    workflows: ["Publish Momentum Libraries"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy-type:
        description: "Deployment type"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - release

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SOURCE: "https://api.nuget.org/v3/index.json"

concurrency:
  group: deploy-template-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    # Only run on workflow_run if the triggering workflow was successful
    # Always run for push events and manual dispatch
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure deployment
        id: config
        uses: ./.github/actions/deployment-config
        with:
          deploy-type: ${{ github.event.inputs.deploy-type }}

      - name: Calculate momentum lib version
        id: latest-mmt-version
        uses: ./.github/actions/version-calculate
        with:
          version-file: .template.config/version.txt
          prerelease: ${{ steps.config.outputs.prerelease }}
          tag-prefix: "v"

      - name: Set Momentum lib for template
        id: set-lib-version
        shell: pwsh
        env:
          CONFIG_PRERELEASE: ${{ steps.config.outputs.prerelease }}
          MMT_PREVIOUS_VERSION: ${{ steps.latest-mmt-version.outputs.previous-version }}
          MMT_PREVIOUS_STABLE_VERSION: ${{ steps.latest-mmt-version.outputs.previous-stable-version }}
        run: |
          $version = if ($env:CONFIG_PRERELEASE -eq "true") {
              $env:MMT_PREVIOUS_VERSION
          } else {
              $env:MMT_PREVIOUS_STABLE_VERSION
          }
          $filePath = ".template.config/template.json"

          Write-Host "Updating $filePath with version: $version"

          # Read the file content
          $content = Get-Content $filePath -Raw

          # Replace the version placeholder
          $updatedContent = $content -replace '__CI_MOMENTUM_VERSION__', $version

          # Write the updated content back
          $updatedContent | Set-Content $filePath -Encoding utf8

          Write-Host "✅ Updated $filePath with version: $version"

      - name: Calculate release version
        id: release-version
        uses: ./.github/actions/version-calculate
        with:
          version-file: .template.config/version.txt
          prerelease: ${{ steps.config.outputs.prerelease }}
          tag-prefix: "template-v"

      - name: Create GitHub release
        uses: ./.github/actions/github-release
        with:
          tag-name: ${{ steps.release-version.outputs.next-tag }}
          release-name: Momentum Template ${{ steps.release-version.outputs.next-tag }}
          prerelease: ${{ steps.config.outputs.prerelease }}
          previous-stable-tag: ${{ steps.release-version.outputs.previous-stable-tag }}

      - name: Publish packages
        uses: ./.github/actions/nuget-publish
        with:
          path: libs/Momentum/Momentum.Template.csproj
          package-version: ${{ steps.release-version.outputs.next-version }}
          pack-args: -p:PackTemplate=true --restore
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}
          nuget-source: ${{ env.NUGET_SOURCE }}

      - name: Deployment Summary
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.next-version }}
          RELEASE_TAG: ${{ steps.release-version.outputs.next-tag }}
          NUGET_SOURCE_URL: ${{ env.NUGET_SOURCE }}
          CONFIG_PRERELEASE: ${{ steps.config.outputs.prerelease }}
        run: |
          $summaryArgs = @{
            ReleaseVersion = $env:RELEASE_VERSION
            ReleaseTag = $env:RELEASE_TAG
            NugetSource = $env:NUGET_SOURCE_URL
          }

          if ($env:CONFIG_PRERELEASE -eq "true") {
            $summaryArgs["DeployPrerelease"] = $true
          }

          & ./.github/scripts/Write-DeploymentSummary.ps1 @summaryArgs
