changelog:
  exclude:
    labels:
      - skip-changelog

  categories:
    - title: "💥 Breaking Changes"
      labels:
        - breaking-change

    - title: "🚀 Features"
      labels:
        - feature
        - enhancement

    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix

    - title: "📚 Documentation"
      labels:
        - documentation
        - docs

    - title: "🏗️ Template"
      labels:
        - template

    - title: "📦 Libraries"
      labels:
        - libraries
        - libs

    - title: "⬆️ Dependencies"
      labels:
        - dependencies

    - title: "🧪 Testing"
      labels:
        - testing
        - tests

    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - ci
        - infrastructure

    - title: "📝 Other Changes"
      labels:
        - "*"
