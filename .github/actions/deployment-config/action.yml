name: "Configure Deployment"
description: "Configure deployment settings for both templates and libraries"

inputs:
  deploy-type:
    description: "Deployment type from workflow_dispatch"
    required: false
    default: ""

outputs:
  prerelease:
    description: "Whether to deploy a prerelease (false = release)"
    value: ${{ steps.config.outputs.prerelease }}
  deploy-docs:
    description: "Whether to deploy documentation"
    value: ${{ steps.config.outputs.deploy-docs }}

runs:
  using: "composite"
  steps:
    - name: Configure deployment
      id: config
      shell: pwsh
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_DEPLOY_TYPE: ${{ inputs.deploy-type }}
      run: |
        & "$env:ACTION_PATH/Configure-Deployment.ps1" -DeployType "$env:INPUT_DEPLOY_TYPE"
